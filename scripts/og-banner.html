<!doctype html>
<!--
  OG image source — rendered to site/og.png at 1200x630.

  Re-render:
    google-chrome --headless --disable-gpu \
      --hide-scrollbars --window-size=1200,630 \
      --default-background-color=00000000 \
      --screenshot=site/og.png \
      file://$(pwd)/scripts/og-banner.html

  Manifesto type — recomposed from the 1500x500 X/Twitter header
  (site/banner.html) for OG's 1.9:1 aspect.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>recon — og</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:       oklch(98.5% 0.004 80);
    --rule:        oklch(88%   0.006 80);
    --ink:         oklch(22%   0.01  60);
    --ink-2:       oklch(40%   0.01  60);
    --ink-3:       oklch(58%   0.01  60);
    --clay:        oklch(58%   0.14  45);
    --serif: 'Instrument Serif', 'Times New Roman', serif;
    --sans:  'Geist', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    --mono:  'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:var(--paper);color:var(--ink);font-family:var(--sans)}

  .og{
    width:1200px;height:630px;
    background:var(--paper);
    padding:54px 80px;
    display:flex;flex-direction:column;justify-content:space-between;
    overflow:hidden;
  }
  .og .top{display:flex;align-items:baseline;justify-content:space-between}
  .og .mark{font-family:var(--serif);font-size:42px;letter-spacing:-.5px;display:flex;align-items:baseline;gap:7px}
  .og .mark .pip{width:8px;height:8px;border-radius:50%;background:var(--clay);transform:translateY(-7px);display:inline-block}
  .og .url{font-family:var(--mono);font-size:14px;letter-spacing:1.6px;color:var(--ink-3);text-transform:uppercase}

  .og .headline{
    font-family:var(--serif);
    font-size:120px;line-height:.95;letter-spacing:-2.8px;color:var(--ink);
    max-width:1040px;
  }
  .og .headline .x{color:var(--clay);font-style:italic}
  .og .headline .muted{color:var(--ink-2)}

  .og .footrow{
    display:flex;align-items:flex-end;justify-content:space-between;
    border-top:1px solid var(--rule);padding-top:20px;
  }
  .og .stats{display:flex;gap:48px}
  .og .stat .k{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--ink-3);text-transform:uppercase}
  .og .stat .v{font-family:var(--serif);font-size:34px;color:var(--ink);margin-top:2px}
  .og .sub{
    font-family:var(--sans);font-size:15px;color:var(--ink-2);
    max-width:340px;text-align:right;line-height:1.4;
  }
</style>
</head>
<body>
  <div class="og">
    <div class="top">
      <div class="mark">recon<span class="pip"></span></div>
      <div class="url">mcprecon.pages.dev</div>
    </div>
    <div class="headline">
      35<span class="x">&times;</span> fewer tokens.<br>
      <span class="muted">same answer.</span>
    </div>
    <div class="footrow">
      <div class="stats">
        <div class="stat"><div class="k">QUERY P50</div><div class="v">10ms</div></div>
        <div class="stat"><div class="k">SYMBOLS</div><div class="v">320K</div></div>
        <div class="stat"><div class="k">LANGUAGES</div><div class="v">9</div></div>
        <div class="stat"><div class="k">BINARY</div><div class="v">24MB</div></div>
      </div>
      <div class="sub">A token-lean MCP server. Replaces Read, Grep, and Glob with 12 symbol-aware tools.</div>
    </div>
  </div>
</body>
</html>
