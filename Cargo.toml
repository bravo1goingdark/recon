[workspace]
members = ["crates/*", "xtask"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.93"
license = "MIT OR Apache-2.0"
repository = "https://github.com/bravo1goingdark/recon"

[workspace.dependencies]
# Internal crates
recon-core = { path = "crates/recon-core" }
recon-parser = { path = "crates/recon-parser" }
recon-storage = { path = "crates/recon-storage" }
recon-search = { path = "crates/recon-search" }
recon-embed = { path = "crates/recon-embed" }
recon-indexer = { path = "crates/recon-indexer" }
recon-server = { path = "crates/recon-server" }

# Async runtime
tokio = { version = "1.49", features = ["rt-multi-thread", "macros", "signal", "sync", "fs"] }

# MCP SDK
rmcp = { version = "1.5", features = ["server", "transport-async-rw", "transport-io"] }

# Tree-sitter
tree-sitter = "0.25"
tree-sitter-rust = "0.24"
tree-sitter-python = "0.25"
tree-sitter-typescript = "0.23"
tree-sitter-javascript = "0.25"
tree-sitter-go = "0.25"
tree-sitter-java = "0.23"
tree-sitter-c = "0.24"
tree-sitter-cpp = "0.23"

# Storage
rusqlite = { version = "0.37", features = ["bundled", "blob", "array", "modern_sqlite"] }
rusqlite_migration = "2"
blake3 = "1"
tantivy = "0.25"

# Search
nucleo = "0.5"
grep-matcher = "0.1"
grep-regex = "0.1"
grep-searcher = "0.1"

# Embeddings (optional)
# fastembed = "5"
# lancedb = "0.23"

# Git & file watching
gix = { version = "0.70", default-features = false, features = ["blob-diff", "worktree-stream", "status"] }
ignore = "0.4"
notify = "8.2"
notify-debouncer-full = "0.6"

# Graph / ranking
petgraph = "0.7"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "1"

# Error handling
thiserror = "2"
anyhow = "1"

# CLI
clap = { version = "4.5", features = ["derive"] }

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }

# Hot-path performance
smallvec = "1"
compact_str = { version = "0.9", features = ["serde"] }
ahash = "0.8"
arc-swap = "1"
rayon = "1"
crossbeam-queue = "0.3"
memmap2 = "0.9"

# Misc
tempfile = "3"
