name = "recon-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ALLOWED_ORIGINS = "https://mcprecon.pages.dev,http://localhost:8788"
FRONTEND_URL = "https://mcprecon.pages.dev"

[[d1_databases]]
binding = "RECON_DB"
database_name = "recon-production"
database_id = "ac8c7180-57b5-4121-9941-e28a8a745f54"
migrations_dir = "migrations"

# Secrets (set via `wrangler secret put`):
# GITHUB_CLIENT_ID
# GITHUB_CLIENT_SECRET
# RAZORPAY_KEY_ID
# RAZORPAY_KEY_SECRET
# RAZORPAY_WEBHOOK_SECRET
# SESSION_SIGNING_KEY
# LICENSE_HMAC_SECRET  ← must match RECON_LICENSE_HMAC_KEY baked into the CLI binary
