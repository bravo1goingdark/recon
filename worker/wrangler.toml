name = "recon-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Hourly cron — downgrades api_keys whose subscription billing period has
# ended. See src/scheduled.ts. Hourly balances "user sees downgrade soon
# after period_end" against D1 scan cost (~730 ticks/month, negligible).
[triggers]
crons = ["0 * * * *"]

[vars]
ALLOWED_ORIGINS = "https://mcprecon.pages.dev,http://localhost:8788"
FRONTEND_URL = "https://mcprecon.pages.dev"

[[d1_databases]]
binding = "RECON_DB"
database_name = "recon-production"
database_id = "ac8c7180-57b5-4121-9941-e28a8a745f54"
migrations_dir = "migrations"

# ── Rate-limit bindings ────────────────────────────────────────────────────────
# Each one is a named bucket; limits are per `key` passed to .limit({key}).
# Cloudflare's "simple" rate-limit binding only supports period values of
# 10 or 60 seconds (Miniflare enforces the same enum). For longer windows
# (e.g. /checkout's conceptual "5 per hour"), we approximate with a
# 60-second burst cap — low enough to kill brute-force, high enough to
# never bite a legitimate click. Actual long-window sliding-limit would
# need a Durable Object; not worth the complexity for today's traffic.

# /v1/billing/checkout — 3 per minute per user. Humans click "Upgrade"
# once; this stops anyone brute-forcing tier mismatches.
[[unsafe.bindings]]
name = "RL_CHECKOUT"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 3, period = 60 }

# /v1/billing/webhook — 100 per minute per IP. Razorpay's actual traffic
# sits well under 1/s; this only kicks in on spoofed or retry storms.
[[unsafe.bindings]]
name = "RL_WEBHOOK"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 100, period = 60 }

# /v1/license — 60 per minute per API-key prefix. The CLI re-validates on
# every cold start and caches for 24h, so legitimate load is low. Guards
# against brute-forcing random keys.
[[unsafe.bindings]]
name = "RL_LICENSE"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 60, period = 60 }

# /v1/dashboard/* — 120 per minute per user. Dashboard polling is bursty
# but bounded; no legitimate client hits this ceiling.
[[unsafe.bindings]]
name = "RL_DASHBOARD"
type = "ratelimit"
namespace_id = "1004"
simple = { limit = 120, period = 60 }

# /v1/account/* — 60 per minute per API-key prefix. The CLI hits this
# once per `recon init` (POST) and `recon repos {list,remove}`. Legitimate
# load is well under the cap; this only kicks in if a misbehaving CLI loops.
[[unsafe.bindings]]
name = "RL_ACCOUNT"
type = "ratelimit"
namespace_id = "1005"
simple = { limit = 60, period = 60 }

# /v1/embed — 1000 per minute per API-key prefix. Hosted-embed is a
# Pro/Team feature, gated by the route handler at the tier level. The
# CF binding is the burst guard on top: a misbehaving CLI looping
# embed calls hits this before doing real damage. Daily quotas (Pro
# 50k/day, Team unlimited) are intentionally NOT enforced here for
# v0.4 — they need persistent counters (KV or D1) and we want to ship
# the route first against real users to learn what limits matter.
[[unsafe.bindings]]
name = "RL_EMBED"
type = "ratelimit"
namespace_id = "1006"
simple = { limit = 1000, period = 60 }

# ── KV bindings ────────────────────────────────────────────────────────────────
# Per-chunk vector cache for /v1/embed. Key = "v1:" + sha256(text) (hex,
# lowercase). Value = JSON-stringified Vec<f32> of length 768. TTL 30
# days — chunks rotate as users re-index, so stale entries age out
# without manual cleanup. Same chunk across users hits Modal once.
#
# Create with:
#   wrangler kv namespace create EMBED_CACHE
# then paste the returned ID in place of `id = "TBD"` below.
[[kv_namespaces]]
binding = "EMBED_CACHE"
id = "665a79cbc43644e3b62bcc5b2bdd438b"   # tests use Miniflare's in-memory KV regardless

# Secrets (set via `wrangler secret put`):
# GITHUB_CLIENT_ID
# GITHUB_CLIENT_SECRET
# RAZORPAY_KEY_ID
# RAZORPAY_KEY_SECRET
# RAZORPAY_WEBHOOK_SECRET
# SESSION_SIGNING_KEY
# LICENSE_HMAC_SECRET    ← must match RECON_LICENSE_HMAC_KEY baked into the CLI binary
# MODAL_EMBED_URL        ← https://<modal-app>.modal.run for the recon-embed Modal deploy
# MODAL_AUTH_TOKEN       ← bearer token shared with the Modal `recon-embed-auth` secret
