name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  # Required by the sigstore/cosign keyless flow: the action trades the
  # workflow's OIDC identity for a short-lived signing certificate.
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Pre-build gate: run the cross-platform + embed test matrix before any
  # release artifact is built. These tests are too slow to run on every PR
  # (see .github/workflows/cross-platform.yml for the nightly schedule), but
  # a tag-push that fails any of them must not publish a binary — hence
  # running inline here and making `build` depend on it via `needs:`.
  test:
    name: Test ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Hard cap per matrix leg. macOS FSEvents in CI has historically delivered
    # file events unreliably enough to wedge a `recv()` test forever; v0.2.2's
    # release run sat hung for 1h+ on the macos-latest leg until manually
    # cancelled. v0.5.4's Windows leg hit the previous 30 min cap with the
    # build at 4m 57s and tests still actively passing at the 30 min mark
    # (run 25248490710) — cold build only, no rust-cache save on Windows
    # (see comment on Swatinem/rust-cache below), so each release rebuilds
    # the whole tree from scratch. 45 min keeps the hang-fast property
    # while leaving enough headroom for the cold Windows build + the
    # workspace test suite as the codebase grows.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        # Post-run cache save flaked on the Windows runner (tar/permission
        # issue on 632 MB cache blob). Post-save failure cascades to mark
        # the whole job failed even though every test passed. Skip saving
        # on Windows — restore still works, and release-tag pushes are rare
        # enough that a cold build on Windows is acceptable.
        if: runner.os != 'Windows'
      - name: Add Defender exclusions (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath  "${{ github.workspace }}"
          Add-MpPreference -ExclusionPath  "$env:USERPROFILE\.cargo"
          Add-MpPreference -ExclusionPath  "$env:USERPROFILE\.rustup"
          Add-MpPreference -ExclusionPath  "$env:TEMP"
          Add-MpPreference -ExclusionProcess "cargo.exe"
          Add-MpPreference -ExclusionProcess "rustc.exe"
          Add-MpPreference -ExclusionProcess "recon.exe"
      - run: cargo test --workspace --exclude recon-embed

  test-local-embed:
    name: Test (local-embed feature)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Retry around pyke.io's flaky CDN — see cross-platform.yml for the
      # rationale. No point failing a release over a transient 504.
      - uses: nick-fields/retry@v3
        with:
          timeout_minutes: 25
          max_attempts: 3
          retry_wait_seconds: 30
          command: cargo test --workspace --features local-embed

  build:
    name: Build ${{ matrix.target }}
    needs: [test, test-local-embed]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: recon
            ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: recon
            ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: recon
            ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: recon
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: recon.exe
            ext: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Ensure cross-compile target is installed
        run: rustup target add ${{ matrix.target }}

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install build dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc --no-progress -y

      # `-p recon-cli` scopes the build to the shipped binary + its
      # transitive deps (recon-server, recon-storage, recon-search, ...).
      # Without this, `cargo build --release` builds every workspace
      # member including recon-embed, which pulls fastembed -> ort-sys
      # -> openssl-sys. openssl-sys needs an arm64 libssl sysroot to
      # cross-compile, which isn't installed on the GitHub runner, and
      # the aarch64-unknown-linux-gnu target failed with "Could not
      # find openssl via pkg-config". recon-cli does NOT depend on
      # recon-embed (verified via `cargo tree -p recon-cli`), so
      # building it alone skips the problem entirely.
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p recon-cli
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          RECON_LICENSE_HMAC_KEY: ${{ secrets.RECON_LICENSE_HMAC_KEY }}

      - name: Strip binary (Linux)
        if: runner.os == 'Linux'
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            aarch64-linux-gnu-strip target/${{ matrix.target }}/release/${{ matrix.artifact }}
          else
            strip target/${{ matrix.target }}/release/${{ matrix.artifact }}
          fi

      - name: Strip binary (macOS)
        if: runner.os == 'macOS'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../recon-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/${{ matrix.artifact }}" `
            -DestinationPath "recon-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: recon-${{ matrix.target }}
          path: recon-${{ matrix.target }}.${{ matrix.ext }}

  publish:
    name: Publish to R2 + update latest.json
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        # `Update latest.json` below needs every tag in the repo so it
        # can `sort -V | tail -1` to decide whether this run is the
        # highest tag. Default fetch-depth=1 only brings the tag's
        # commit; the follow-up `git fetch --tags` then exhibits the
        # silent-fail-with-set-e mode we hit in v0.3.3 release run
        # 25097548024. fetch-depth=0 makes every tag available locally
        # so no second fetch is needed.
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install wrangler
        run: npm install -g wrangler

      # ─── Supply-chain verification artifacts ──────────────────────────────
      # SHA256SUMS.txt: one line per tarball/zip in the standard
      # `<hex>  <filename>` format that `sha256sum -c` consumes. This is
      # what scripts/install.{sh,ps1} fetch and verify against before
      # extracting — tampered binaries fail the check.
      - name: Generate SHA256SUMS.txt
        run: |
          set -euo pipefail
          for f in recon-*.tar.gz recon-*.zip; do
            [ -f "$f" ] || continue
            sha256sum "$f" >> SHA256SUMS.txt
          done
          echo "── SHA256SUMS.txt ──"
          cat SHA256SUMS.txt

      # Sigstore keyless: no long-lived signing key. The cosign action
      # exchanges our GitHub OIDC token for a short-lived Fulcio
      # certificate and signs SHA256SUMS.txt with it. The resulting
      # .sig and .pem are uploaded alongside the sums so install scripts
      # (with cosign installed) can verify provenance.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SHA256SUMS.txt (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob \
            --output-signature SHA256SUMS.txt.sig \
            --output-certificate SHA256SUMS.txt.pem \
            SHA256SUMS.txt
          echo "signed; certificate identity = $(cosign triangulate SHA256SUMS.txt 2>/dev/null || echo 'n/a')"

      - name: Upload binaries + sums + signatures to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          # Upload binaries
          for f in recon-*.tar.gz recon-*.zip; do
            [ -f "$f" ] || continue
            case "$f" in
              *.tar.gz) ct="application/gzip" ;;
              *.zip)    ct="application/zip" ;;
            esac
            echo "Uploading $f → releases/$VERSION/$f"
            wrangler r2 object put "recon-releases/releases/$VERSION/$f" \
              --file "$f" \
              --content-type "$ct" \
              --remote
          done
          # Upload sums + cosign artifacts. The sums file is served as
          # text/plain so browsers don't try to interpret it.
          for f in SHA256SUMS.txt SHA256SUMS.txt.sig SHA256SUMS.txt.pem; do
            [ -f "$f" ] || continue
            echo "Uploading $f → releases/$VERSION/$f"
            wrangler r2 object put "recon-releases/releases/$VERSION/$f" \
              --file "$f" \
              --content-type "text/plain" \
              --remote
          done

      - name: Update latest.json (only if this is the highest tag)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          # Race guard: when multiple tags are pushed simultaneously
          # (e.g. v0.3.0 + v0.3.1 + v0.3.2 in one `git push`), each
          # workflow run is parallel and the last to call
          # `wrangler r2 object put` wins — which is non-deterministic
          # and has bitten us once already (v0.3.0 finished after
          # v0.3.2, so latest.json got pinned to the lower version).
          #
          # Fix: each run reads every tag from the repo, sorts by
          # semver, and only the highest tag's run is allowed to
          # write latest.json. Lower-versioned simultaneous releases
          # become no-ops here, leaving the manifest pointing at the
          # genuinely-latest version regardless of finish order.
          #
          # The checkout above pins `fetch-depth: 0` so all tag refs
          # are already local — no second `git fetch --tags` is needed
          # (that fetch silently failed in v0.3.3 release run
          # 25097548024 under default depth=1, which made `set -e`
          # kill the script with no diagnostic).
          echo "── tags available locally ──"
          git tag -l 'v*' | sort -V
          HIGHEST=$(git tag -l 'v*' | sort -V | tail -1)
          echo "── this tag: $VERSION  ·  highest tag: $HIGHEST ──"
          if [ "$VERSION" != "$HIGHEST" ]; then
            echo "Skipping latest.json update: $VERSION is not the highest tag ($HIGHEST)."
            exit 0
          fi
          echo "{\"version\":\"$VERSION\"}" > latest.json
          wrangler r2 object put recon-releases/latest.json \
            --file latest.json \
            --content-type "application/json" \
            --remote

      - name: Create GitHub Release (private, for changelog)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            recon-*.tar.gz
            recon-*.zip
            SHA256SUMS.txt
            SHA256SUMS.txt.sig
            SHA256SUMS.txt.pem
          generate_release_notes: true

  deploy-site:
    name: Deploy Pages site + Functions
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install wrangler
        run: npm install -g wrangler

      # Single source of truth for installers: scripts/install.{sh,ps1}
      # are copied into the Pages root here so `curl …/install.sh | bash`
      # always serves the version that ships with the release. No more
      # drift between site/install.ps1 and scripts/install.ps1.
      - name: Sync installers into site/
        run: |
          install -m 0755 scripts/install.sh  site/install.sh
          install -m 0644 scripts/install.ps1 site/install.ps1

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd site && wrangler pages deploy . \
            --project-name mcprecon \
            --commit-message "release ${{ github.ref_name }}"
