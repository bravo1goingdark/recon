name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['docs/**', '*.md']
  pull_request:
    branches: [main]
    paths-ignore: ['docs/**', '*.md']

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  check:
    name: Check + Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Exclude recon-embed (lancedb pulls 2000+ crates, fills CI disk).
      - run: cargo clippy --workspace --exclude recon-embed --all-targets -- -D warnings

  # Linux-only test pass on every PR. Matches the platform the majority
  # of contributors develop on; the full cross-platform + embed matrix
  # lives in cross-platform.yml and is gated on release tags + nightly
  # schedule so PRs don't wait 40+ min for a Windows runner or on a
  # flaky pyke.io CDN download of ort-sys prebuilts.
  test:
    name: Test ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Exclude recon-embed — covered in cross-platform.yml where the
      # flaky ort-sys download can be retried without blocking PRs.
      - run: cargo test --workspace --exclude recon-embed

  # Supply-chain gates. Run in parallel with the test matrix so a missing
  # RUSTSEC advisory or a license-boundary break blocks a PR the same way
  # a failing test does.
  audit:
    name: cargo-audit (RUSTSEC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      # RUSTSEC-2024-0436: paste 1.0.15 unmaintained — tracked in deny.toml
      # with the same rationale; no drop-in replacement in our dep graph yet.
      - run: cargo audit --deny warnings --ignore RUSTSEC-2024-0436

  deny:
    name: cargo-deny (licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  # Worker test suite (Vitest + @cloudflare/vitest-pool-workers).
  # Typecheck + unit tests on every PR.
  worker:
    name: Worker typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test -- --reporter=verbose
