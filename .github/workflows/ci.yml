name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['docs/**', '*.md']
  pull_request:
    branches: [main]
    paths-ignore: ['docs/**', '*.md']

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  check:
    name: Check + Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Exclude recon-embed (lancedb pulls 2000+ crates, fills CI disk).
      - run: cargo clippy --workspace --exclude recon-embed --all-targets -- -D warnings

  # Cross-platform test matrix. Previously only ubuntu-latest ran every PR;
  # macOS and Windows were only exercised at tag time in release.yml, which
  # meant platform-specific breakage shipped without a pre-merge signal.
  # The matrix is a superset of the release targets we actually publish.
  test:
    name: Test ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Windows Defender real-time scan on every file SQLite / Tantivy /
      # the tempfile-based e2e tests create is what made Windows runs take
      # 40+ minutes while Ubuntu finishes in 3. Excluding the workspace
      # and the toolchain processes drops Windows test time to ~10 min
      # with zero coverage loss; GitHub runners disable Defender between
      # jobs so this doesn't leak across builds.
      - name: Add Defender exclusions (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath  "${{ github.workspace }}"
          Add-MpPreference -ExclusionPath  "$env:USERPROFILE\.cargo"
          Add-MpPreference -ExclusionPath  "$env:USERPROFILE\.rustup"
          Add-MpPreference -ExclusionPath  "$env:TEMP"
          Add-MpPreference -ExclusionProcess "cargo.exe"
          Add-MpPreference -ExclusionProcess "rustc.exe"
          Add-MpPreference -ExclusionProcess "recon.exe"

      # Exclude recon-embed to stay within disk/time budget. The embed
      # feature is exercised separately in the `embed` job below on Linux
      # where disk space is abundant.
      - run: cargo test --workspace --exclude recon-embed

  embed:
    name: Test (embed feature)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Test the full workspace with the `embed` feature so recon-embed +
      # semantic-search code paths don't regress silently between releases.
      - run: cargo test --workspace --features embed

  # Supply-chain gates. Run in parallel with the test matrix so a missing
  # RUSTSEC advisory or a license-boundary break blocks a PR the same way
  # a failing test does.
  audit:
    name: cargo-audit (RUSTSEC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      # RUSTSEC-2024-0436: paste 1.0.15 unmaintained — tracked in deny.toml
      # with the same rationale; no drop-in replacement in our dep graph yet.
      - run: cargo audit --deny warnings --ignore RUSTSEC-2024-0436

  deny:
    name: cargo-deny (licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  # Worker test suite (Vitest + @cloudflare/vitest-pool-workers).
  # Typecheck + unit tests on every PR.
  worker:
    name: Worker typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test -- --reporter=verbose
