name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['site/**', 'worker/**', 'docs/**', '*.md']
  pull_request:
    branches: [main]
    paths-ignore: ['site/**', 'worker/**', 'docs/**', '*.md']

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  check:
    name: Check + Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Exclude recon-embed (lancedb pulls 2000+ crates, fills disk)
      - run: cargo clippy --workspace --exclude recon-embed --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Exclude recon-embed to stay within disk/time budget
      - run: cargo test --workspace --exclude recon-embed
