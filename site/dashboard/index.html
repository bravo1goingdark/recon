<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dashboard — recon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css">
<style>
  .page-title{font-size:clamp(32px, 5vw, 48px);letter-spacing:-0.03em;margin:40px 0 32px}
  .section-label{font-family:var(--mono);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-3);margin:36px 0 16px;display:flex;align-items:center;gap:10px}
  .section-label::after{content:'';flex:1;height:1px;background:var(--rule)}
  .profile-card{display:flex;align-items:center;gap:16px;padding:20px 0}
  .avatar{border-radius:50%;border:2px solid var(--rule)}
  .profile-info{display:flex;flex-direction:column;gap:2px}
  .profile-info strong{font-size:1.1rem}
  .key-row{display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid var(--rule-soft);font-size:13px;flex-wrap:wrap}
  .key-row.revoked{opacity:.35}
  .key-row code{font-family:var(--mono);font-size:12px;background:var(--paper-2);padding:3px 10px;border-radius:2px;letter-spacing:.02em}
  .key-row .spacer{flex:1}
  .billing-card{padding:20px 0;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .billing-limits{display:flex;gap:20px;font-family:var(--mono);font-size:12px;color:var(--ink-2)}
  .actions{margin:20px 0}
  /* Key reveal modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
  .modal{background:var(--paper);border:1px solid var(--rule);border-radius:4px;padding:32px;max-width:520px;width:90%}
  .modal h3{font-size:1.3rem;margin-bottom:8px}
  .modal p{color:var(--ink-2);font-size:13px;margin-bottom:16px}
  .modal code{display:block;font-family:var(--mono);font-size:11px;background:var(--paper-2);padding:14px;border-radius:2px;word-break:break-all;margin-bottom:16px;letter-spacing:.02em;line-height:1.6;border:1px solid var(--rule)}
  .modal-actions{display:flex;gap:8px}
</style>
</head>
<body>

<nav class="top">
  <a href="/" class="mark"><svg width="24" height="24" viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="4" fill="currentColor"/><circle cx="40" cy="40" r="14" stroke="currentColor" stroke-width="1.5"/><circle cx="40" cy="40" r="24" stroke="currentColor" stroke-width="1" opacity="0.55"/><circle cx="40" cy="40" r="34" stroke="currentColor" stroke-width="1" opacity="0.25"/><line x1="40" y1="40" x2="68" y2="20" stroke="var(--clay)" stroke-width="2" stroke-linecap="round"/><circle cx="68" cy="20" r="3.5" fill="var(--clay)"/></svg><span>recon<span class="dot"></span></span></a>
  <ul>
    <li><a href="/docs">Docs</a></li>
    <li><a href="/pricing">Pricing</a></li>
  </ul>
  <div class="right">
    <a href="#" onclick="logout()" style="font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.02em">sign out</a>
    <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme"><span id="theme-icon">◑</span></button>
  </div>
</nav>

<div class="wrap narrow">
  <h1 class="page-title">Dashboard</h1>

  <div id="profile">
    <p class="dim" style="font-family:var(--mono);font-size:12px">loading...</p>
  </div>

  <div class="section-label">API Keys</div>
  <div id="keys"><p class="dim" style="font-family:var(--mono);font-size:12px">loading...</p></div>
  <div class="actions">
    <button onclick="generateKey()" class="btn primary sm">Generate new key →</button>
  </div>

  <div class="section-label">Billing</div>
  <div id="billing"><p class="dim" style="font-family:var(--mono);font-size:12px">loading...</p></div>
</div>

<!-- Key reveal modal -->
<div class="modal-overlay" id="key-modal">
  <div class="modal">
    <h3>Your new API key</h3>
    <p>Copy this key now — you won't see it again. Add it to your environment:</p>
    <code id="new-key-value"></code>
    <div class="modal-actions">
      <button id="copy-btn" onclick="copyKey()" class="btn primary sm">Copy to clipboard</button>
      <button onclick="closeKeyModal()" class="btn ghost sm">Done</button>
    </div>
  </div>
</div>

<footer class="site">
  <div>© 2026 recon</div>
  <div>Code never leaves your machine</div>
</footer>

<script src="/js/theme.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
