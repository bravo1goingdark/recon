<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>recon — banner</title>
<meta name="description" content="recon social banner — 35× fewer tokens. same answer." />
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:       oklch(98.5% 0.004 80);
    --paper-2:     oklch(96.5% 0.006 80);
    --rule:        oklch(88%   0.006 80);
    --rule-soft:   oklch(93%   0.005 80);
    --ink:         oklch(22%   0.01  60);
    --ink-2:       oklch(40%   0.01  60);
    --ink-3:       oklch(58%   0.01  60);
    --clay:        oklch(58%   0.14  45);
    --clay-soft:   oklch(94%   0.03  45);

    --serif: 'Instrument Serif', 'Times New Roman', serif;
    --sans:  'Geist', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    --mono:  'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#f3f1ec;color:var(--ink);font-family:var(--sans)}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px}

  .banner{position:relative;overflow:hidden;font-family:var(--sans)}
  .banner.light{background:var(--paper);color:var(--ink)}

  /* SOCIAL  1500 x 500 — Manifesto (light) */
  .social{width:1500px;height:500px}
  .soc-v2{padding:60px 80px;display:flex;flex-direction:column;justify-content:space-between}
  .soc-v2 .top{display:flex;align-items:baseline;justify-content:space-between}
  .soc-v2 .mark{font-family:var(--serif);font-size:38px;letter-spacing:-.5px;display:flex;align-items:baseline;gap:6px}
  .soc-v2 .mark .pip{width:7px;height:7px;border-radius:50%;background:var(--clay);transform:translateY(-6px);display:inline-block}
  .soc-v2 .url{font-family:var(--mono);font-size:13px;letter-spacing:1.5px;color:var(--ink-3);text-transform:uppercase}
  .soc-v2 .headline{font-family:var(--serif);font-size:118px;line-height:.95;letter-spacing:-3px;color:var(--ink);max-width:1100px}
  .soc-v2 .headline .x{color:var(--clay);font-style:italic}
  .soc-v2 .headline .muted{color:var(--ink-2)}
  .soc-v2 .footrow{display:flex;align-items:flex-end;justify-content:space-between;border-top:1px solid var(--rule);padding-top:18px}
  .soc-v2 .stats{display:flex;gap:48px}
  .soc-v2 .stat .k{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--ink-3);text-transform:uppercase}
  .soc-v2 .stat .v{font-family:var(--serif);font-size:32px;color:var(--ink);margin-top:2px}
  .soc-v2 .sub{font-family:var(--sans);font-size:15px;color:var(--ink-2);max-width:380px;text-align:right;line-height:1.4}
</style>
</head>
<body>
  <div class="banner light social soc-v2">
    <div class="top">
      <div class="mark">recon<span class="pip"></span></div>
      <div class="url">mcprecon.pages.dev</div>
    </div>
    <div class="headline">
      35<span class="x">&times;</span> fewer tokens.<br>
      <span class="muted">same answer.</span>
    </div>
    <div class="footrow">
      <div class="stats">
        <div class="stat"><div class="k">QUERY P50</div><div class="v">10ms</div></div>
        <div class="stat"><div class="k">SYMBOLS</div><div class="v">320K</div></div>
        <div class="stat"><div class="k">LANGUAGES</div><div class="v">9</div></div>
        <div class="stat"><div class="k">TOOLS</div><div class="v">20</div></div>
      </div>
      <div class="sub">A token-lean MCP server. Replaces Read, Grep, and Glob with 20 symbol-aware tools.</div>
    </div>
  </div>
</body>
</html>
