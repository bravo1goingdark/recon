  <!-- Text -->
  <text x="72" y="200" font-family="Georgia, serif" font-size="96" font-style="italic" fill="#f5f3ef" letter-spacing="-2">recon<tspan fill="#b07040" font-style="normal">.</tspan></text>
  <text x="72" y="280" font-family="system-ui, sans-serif" font-size="32" fill="#a09888" font-weight="300">Local-first MCP server for AI coding agents</text>
